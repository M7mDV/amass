name: Amass Subdomain Enumeration

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main]
    paths:
      - 'domains.txt'

jobs:
  enumerate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Amass
        run: |
          CGO_ENABLED=0 go install -v github.com/owasp-amass/amass/v5/cmd/amass@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          amass -version

      - name: Run Amass Enumeration
        run: |
          amass enum \
            -passive \
            -df domains.txt
          
          echo "=== Extracting subdomains from DB ==="
          while IFS= read -r domain; do
            echo "--- Subdomains for: $domain ---"
            amass subs -names -d "$domain" || true
          done < domains.txt | sort -u > sub-domains.txt
          
          echo "=== Results ==="
          cat sub-domains.txt
          echo "=== Total: $(wc -l < sub-domains.txt) subdomains ==="

      - name: Send Results to Discord (as File)
        if: success()
        run: |
          COUNT=$(wc -l < sub-domains.txt)
          DOMAINS=$(cat domains.txt | tr '\n' ', ' | sed 's/, $//')
          
          # بيبعت الملف كـ attachment مع embed message
          curl -X POST \
            -H "Content-Type: multipart/form-data" \
            -F "file=@sub-domains.txt" \
            -F "payload_json={
              \"username\": \"Amass Bot\",
              \"avatar_url\": \"https://owasp.org/www-project-amass/assets/images/amass.png\",
              \"embeds\": [{
                \"title\": \"🔍 Subdomain Enumeration Results\",
                \"description\": \"Scan completed for: **${DOMAINS}**\",
                \"color\": 3447003,
                \"fields\": [
                  {
                    \"name\": \"📊 Total Subdomains Found\",
                    \"value\": \"${COUNT}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"📎 Attachment\",
                    \"value\": \"sub-domains.txt\",
                    \"inline\": true
                  }
                ],
                \"footer\": {
                  \"text\": \"Amass v5.1.1 • $(date -u +\"%Y-%m-%d %H:%M UTC\")\"
                }
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subdomains-results
          path: sub-domains.txt
