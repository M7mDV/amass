name: Amass Subdomain Enumeration

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main]
    paths:
      - 'domains.txt'

jobs:
  enumerate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Amass
        run: |
          CGO_ENABLED=0 go install -v github.com/owasp-amass/amass/v5/cmd/amass@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          amass -version

      - name: Run Amass Enumeration
        run: |
          # في v5: -passive بيكفي، مفيش -noalts ولا -norecursive
          amass enum \
            -passive \
            -df domains.txt
          
          # في v5 النتائج بتتخزن في SQLite DB، بنجيبها بـ amass subs
          echo "=== Extracting subdomains from DB ==="
          # نعمل loop على كل domain في domains.txt
          while IFS= read -r domain; do
            echo "--- Subdomains for: $domain ---"
            amass subs -names -d "$domain" || true
          done < domains.txt | sort -u > sub-domains.txt
          
          echo "=== Results ==="
          cat sub-domains.txt
          echo "=== Total: $(wc -l < sub-domains.txt) subdomains ==="

      - name: Send Results to Discord
        if: success()
        run: |
          # لو الملف فاضي، نبعت رسالة مختلفة
          if [ ! -s sub-domains.txt ]; then
            curl -H "Content-Type: application/json" \
              -X POST \
              -d '{
                "username": "Amass Bot",
                "embeds": [{
                  "title": "🔍 Subdomain Enumeration",
                  "description": "No subdomains found!",
                  "color": 15158332,
                  "footer": {"text": "Amass v5 Scan"}
                }]
              }' \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
            exit 0
          fi
          
          RESULTS=$(cat sub-domains.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          COUNT=$(wc -l < sub-domains.txt)
          DOMAINS=$(cat domains.txt | sed ':a;N;$!ba;s/\n/, /g')
          
          curl -H "Content-Type: application/json" \
            -X POST \
            -d '{
              "username": "Amass Bot",
              "avatar_url": "https://owasp.org/www-project-amass/assets/images/amass.png",
              "embeds": [{
                "title": "🔍 Subdomain Enumeration Results",
                "description": "Scan completed for: **'"$DOMAINS"'**",
                "color": 3447003,
                "fields": [
                  {
                    "name": "📊 Total Subdomains Found",
                    "value": "'"$COUNT"'",
                    "inline": true
                  },
                  {
                    "name": "📄 Results",
                    "value": "```\n'"$RESULTS"'\n```"
                  }
                ],
                "footer": {
                  "text": "Amass v5.1.1 • '"$(date -u +"%Y-%m-%d %H:%M UTC")"'"
                }
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subdomains-results
          path: sub-domains.txt
